name: Sync Sources

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync plugins from sources.json
        run: |
          updated=0
          skipped=0

          while read -r entry; do
            name=$(echo "$entry" | jq -r '.name')
            jsURL=$(echo "$entry" | jq -r '.jsURL')
            jsonURL=$(echo "$entry" | jq -r '.jsonURL')

            mkdir -p "$name"

            jsTmp=$(mktemp)
            jsonTmp=$(mktemp)

            jsFail=0; jsonFail=0
            curl -sL --fail "$jsURL" -o "$jsTmp" 2>/dev/null || jsFail=1
            curl -sL --fail "$jsonURL" -o "$jsonTmp" 2>/dev/null || jsonFail=1

            jsChanged=0; jsonChanged=0

            if [ "$jsFail" = "0" ] && [ -f "$name/plugin.js" ]; then
              newHash=$(sha256sum "$jsTmp" | cut -d' ' -f1)
              oldHash=$(sha256sum "$name/plugin.js" | cut -d' ' -f1)
              [ "$newHash" != "$oldHash" ] && jsChanged=1
            elif [ "$jsFail" = "0" ] && [ ! -f "$name/plugin.js" ]; then
              jsChanged=1
            fi

            if [ "$jsonFail" = "0" ] && [ -f "$name/plugin.json" ]; then
              newHash=$(sha256sum "$jsonTmp" | cut -d' ' -f1)
              oldHash=$(sha256sum "$name/plugin.json" | cut -d' ' -f1)
              [ "$newHash" != "$oldHash" ] && jsonChanged=1
            elif [ "$jsonFail" = "0" ] && [ ! -f "$name/plugin.json" ]; then
              jsonChanged=1
            fi

            if [ "$jsChanged" = "1" ] || [ "$jsonChanged" = "1" ]; then
              [ "$jsChanged" = "1" ] && cp "$jsTmp" "$name/plugin.js"
              [ "$jsonChanged" = "1" ] && cp "$jsonTmp" "$name/plugin.json"
              echo "UPDATED $name"
              updated=$((updated + 1))
            elif [ "$jsFail" = "1" ] || [ "$jsonFail" = "1" ]; then
              echo "SKIP  $name (remote 404; local kept)"
              skipped=$((skipped + 1))
            else
              echo "SKIP  $name (unchanged)"
              skipped=$((skipped + 1))
            fi

            rm -f "$jsTmp" "$jsonTmp"
          done < <(jq -c '.plugins[]' sources.json)

          echo "Done. $updated updated, $skipped skipped."

      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: sync plugins from sources [skip ci]"
          git push

      - name: Trigger bundle workflow
        run: gh workflow run bundle.yml
        env:
          GH_TOKEN: ${{ github.token }}
