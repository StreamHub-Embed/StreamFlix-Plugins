name: Bundle Plugins

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  bundle:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bundle all plugins (minify + mangle)
        run: node bundle.js --all .

      - name: Commit bundles
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add */plugin.bundle.js
          git diff --staged --quiet || git commit -m "chore: update plugin.bundle.js [skip ci]"
          git push
